databases:
  - name: padelup-db
    plan: free
    databaseName: padelup
    user: padelup

services:
  - type: web
    name: padelup-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --preload --log-level debug --access-logfile - --error-logfile -"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: padelup-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "1"
